name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-lint:
    name: build-and-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (workspace root)
        run: npm ci --include=dev

      - name: Build shared
        run: npm -w shared run build

      - name: Build backend
        run: npm -w backend run build

      - name: Build frontend
        run: npm -w frontend run build

      - name: Lint frontend
        run: npm -w frontend run lint
