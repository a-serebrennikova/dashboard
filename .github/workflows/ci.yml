name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (workspace root)
        run: npm ci --include=dev

      - name: Build shared
        run: npm -w packages/shared run build

      - name: Build backend
        run: npm -w packages/backend run build

      - name: Build frontend
        run: npm -w packages/frontend run build

  frontend-tests:
    name: frontend-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (workspace root)
        run: npm ci --include=dev

      - name: Run frontend tests
        run: npm -w packages/frontend run test
